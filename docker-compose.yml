services:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9082:8080"
    environment:
      SERVER_ADDR: ":8080"
      DB_PATH: "/app/data/social-network.db"
      MIGRATIONS_DIR: "/app/pkg/db/migrations/sqlite"
    volumes:
      - uiux-backend-data:/app/data
      - uiux-backend-uploads:/app/uploads
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:9082"
    ports:
      - "8082:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uiux-backend-data:
  uiux-backend-uploads:
