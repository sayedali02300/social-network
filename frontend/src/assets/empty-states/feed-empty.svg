<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 160" fill="none">
  <!-- Monitor -->
  <rect x="30" y="20" width="120" height="80" rx="8" fill="#CBD5E1" stroke="#94A3B8" stroke-width="2"/>
  <rect x="36" y="26" width="108" height="64" rx="4" fill="#E2E8F0"/>
  <!-- Blank screen lines -->
  <line x1="50" y1="50" x2="130" y2="50" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
  <line x1="50" y1="64" x2="110" y2="64" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
  <line x1="50" y1="78" x2="120" y2="78" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
  <!-- Stand -->
  <rect x="82" y="100" width="16" height="16" fill="#94A3B8"/>
  <rect x="68" y="114" width="44" height="6" rx="3" fill="#94A3B8"/>
  <!-- Plus icon (call to action) -->
  <circle cx="143" cy="35" r="12" fill="#2563EB"/>
  <line x1="143" y1="30" x2="143" y2="40" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="138" y1="35" x2="148" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="90" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#6B7280" font-weight="600">No posts yet</text>
</svg>
